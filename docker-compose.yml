services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/osarotechstore
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "node", "--eval", "require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode !== 200 ? 1 : 0))"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "5000:5000"
    volumes:
      - product-uploads:/app/uploads

  stripe-cli:
    image: stripe/stripe-cli:latest
    entrypoint: ["sh", "-c"]
    command: export STRIPE_API_KEY=$$STRIPE_SECRET_KEY && stripe listen --webhook-secret $$STRIPE_WEBHOOK_SECRET --forward-to http://backend:5000/api/payments/webhook
    env_file: ./backend/.env
    depends_on:
      - backend
    profiles:
      - stripe

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: /api
        REACT_APP_GOOGLE_API_URL: /api/auth/google
        REACT_APP_STRIPE_PUBLIC_KEY: ${REACT_APP_STRIPE_PUBLIC_KEY:-pk_test_key}
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongo-data:
  product-uploads:
