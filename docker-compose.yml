services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      TOKEN_SECRET: ${TOKEN_SECRET:-local-dev-secret-change-me}
      TOKEN_EXPIRES_IN: 15m
      DATABASE_PROVIDER: mongo
      MONGO_URI: mongodb://mongo:27017/osarotechstore
      EVENT_BUS_PROVIDER: redis
      REDIS_URL: redis://redis:6379
      PAYMENT_PROVIDER: disabled
      CLIENT_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: /api
        REACT_APP_GOOGLE_API_URL: http://localhost:5000/api/auth/google
        REACT_APP_STRIPE_PUBLIC_KEY: ${REACT_APP_STRIPE_PUBLIC_KEY:-pk_test_key}
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongo-data:
