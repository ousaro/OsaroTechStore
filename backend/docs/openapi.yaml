  /payments/intent:
    post:
      tags: [Payments]
      summary: Create payment intent
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentIntentRequest"
      responses:
        "201":
          description: Payment workflow with provider redirect URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "500":
          description: Stripe session creation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/webhook:
    post:
      tags: [Payments]
      summary: Payment provider webhook endpoint
      description: |
        Raw-body webhook endpoint. Availability depends on the configured payment provider.
        User JWT auth is not required; provider signature verification is handled by the payment gateway.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
        "400":
          description: Signature verification failed

  /payments/order/{orderId}:
    get:
      tags: [Payments]
      summary: Get payment by order id
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
