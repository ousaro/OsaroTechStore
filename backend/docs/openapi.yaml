openapi: 3.0.3
info:
  title: OsaroTechStore API
  version: 1.0.0
  description: |
    REST API documentation for OsaroTechStore backend.
    This specification mirrors the current Express routes and controller behavior.
servers:
  - url: http://localhost:5000/api
    description: Local development server
tags:
  - name: Authentication
  - name: Users
  - name: Products
  - name: Categories
  - name: Orders
  - name: Payments
  - name: Operations
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
    EmptyFieldsError:
      type: object
      properties:
        error:
          type: string
        emptyFields:
          type: array
          items:
            type: string
    Address:
      type: object
      required: [street, city, country]
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
    Money:
      type: object
      properties:
        amount:
          type: number
        currency:
          type: string
          example: USD
    OrderLine:
      type: object
      required: [productId, name, price, quantity]
      properties:
        productId:
          type: string
        name:
          type: string
        price:
          type: number
          description: Input unit price used when creating an order.
        quantity:
          type: number
        unitPrice:
          $ref: "#/components/schemas/Money"
        subtotal:
          $ref: "#/components/schemas/Money"
    UserPublic:
      type: object
      properties:
        _id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        picture:
          type: string
        admin:
          type: boolean
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        country:
          type: string
        state:
          type: string
        postalCode:
          type: number
        favorites:
          type: array
          items:
            type: object
            additionalProperties: true
        cart:
          type: array
          items:
            type: object
            additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserWithToken:
      allOf:
        - $ref: "#/components/schemas/UserPublic"
        - type: object
          properties:
            token:
              type: string
    RegisterRequest:
      type: object
      required: [firstName, lastName, email, password, confirmPassword]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        confirmPassword:
          type: string
          format: password
        picture:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    UserUpdateRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        picture:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        country:
          type: string
        state:
          type: string
        postalCode:
          type: number
        favorites:
          type: array
          items:
            type: object
            additionalProperties: true
        cart:
          type: array
          items:
            type: object
            additionalProperties: true
    PasswordUpdateRequest:
      type: object
      required: [currentPassword, newPassword, confirmPassword]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
        confirmPassword:
          type: string
          format: password
    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        currency:
          type: string
          example: USD
        category:
          type: string
          description: Display name of the populated category.
        categoryId:
          type: string
          description: Identifier of the category used by write requests.
        stock:
          type: number
        images:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [new, active, inactive, deprecated]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProductCreateRequest:
      type: object
      required: [name, price, category]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        currency:
          type: string
          default: USD
        category:
          type: string
        stock:
          type: number
          default: 0
        images:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [new, active, inactive, deprecated]
          default: new
    ProductUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        currency:
          type: string
        category:
          type: string
        stock:
          type: number
        images:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [new, active, inactive, deprecated]
    Category:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CategoryCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
    Order:
      type: object
      properties:
        _id:
          type: string
        ownerId:
          type: string
        orderLines:
          type: array
          items:
            $ref: "#/components/schemas/OrderLine"
        deliveryAddress:
          $ref: "#/components/schemas/Address"
        currency:
          type: string
          example: USD
        orderStatus:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
        paymentStatus:
          type: string
          enum: [pending, paid, failed, expired, refunded]
        totalPrice:
          $ref: "#/components/schemas/Money"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    OrderCreateRequest:
      type: object
      required:
        - orderLines
        - deliveryAddress
      properties:
        orderLines:
          type: array
          items:
            $ref: "#/components/schemas/OrderLine"
        deliveryAddress:
          $ref: "#/components/schemas/Address"
        currency:
          type: string
          default: USD
    OrderUpdateRequest:
      type: object
      properties:
        orderLines:
          type: array
          items:
            $ref: "#/components/schemas/OrderLine"
        deliveryAddress:
          $ref: "#/components/schemas/Address"
        orderStatus:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
        paymentStatus:
          type: string
          enum: [pending, paid, failed, expired, refunded]
        currency:
          type: string
    PaymentIntentItem:
      type: object
      required: [name, price, quantity]
      properties:
        name:
          type: string
        price:
          type: number
        quantity:
          type: integer
    CreatePaymentIntentRequest:
      type: object
      required: [orderId, items]
      properties:
        orderId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/PaymentIntentItem"
        currency:
          type: string
          default: USD
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
        version:
          type: string
        uptimeSeconds:
          type: number
        timestamp:
          type: string
          format: date-time
    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, fail]
        service:
          type: string
        version:
          type: string
        checks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
                enum: [ok, fail]
            additionalProperties: true
        timestamp:
          type: string
          format: date-time
    Payment:
      type: object
      properties:
        _id:
          type: string
        orderId:
          type: string
        provider:
          type: string
        workflowType:
          type: string
        paymentStatus:
          type: string
        sessionId:
          type: string
        providerPaymentId:
          type: string
        url:
          type: string
          format: uri
        occurredAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
paths:
  /health:
    servers:
      - url: http://localhost:5000
        description: Local development server
    get:
      tags: [Operations]
      summary: Liveness check
      responses:
        "200":
          description: Backend process is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    servers:
      - url: http://localhost:5000
        description: Local development server
    get:
      tags: [Operations]
      summary: Readiness check
      description: Runs configured database, payment, and event bus checks.
      responses:
        "200":
          description: All configured dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: At least one configured dependency failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"

  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithToken"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate user with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithToken"
        "400":
          description: Invalid credentials or malformed request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/google:
    get:
      tags: [Authentication]
      summary: Start Google OAuth flow
      responses:
        "302":
          description: Redirect to Google authentication page
  /auth/google/callback:
    get:
      tags: [Authentication]
      summary: Google OAuth callback endpoint
      responses:
        "302":
          description: Redirect to frontend success or login page

  /auth/users:
    get:
      tags: [Authentication]
      summary: List all non-admin users
      description: Admin-only route.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserPublic"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin privileges are required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/users/{id}:
    get:
      tags: [Authentication]
      summary: Get user by id
      description: Admin-only route.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "403":
          description: Admin privileges are required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Authentication]
      summary: Update managed user fields
      description: Admin-only route.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "404":
          description: Invalid id or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Authentication]
      summary: Delete user by id
      description: Admin-only route.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "404":
          description: Invalid id or not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me:
    get:
      tags: [Users]
      summary: Get my profile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Users]
      summary: Update my profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"

  /users/me/password:
    put:
      tags: [Users]
      summary: Change my password
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordUpdateRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400":
          description: Invalid password update request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Current password is incorrect or user is not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by id
      description: Admin-only route.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "403":
          description: Admin privileges are required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/cart:
    put:
      tags: [Users]
      summary: Replace my cart
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cart:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"

  /users/me/favorites/{productId}:
    put:
      tags: [Users]
      summary: Add or remove a product from my favorites
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [add, remove]
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "404":
          description: Invalid id or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products:
    get:
      tags: [Products]
      summary: Get all products
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [new, active, inactive, deprecated]
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      tags: [Products]
      summary: Create a new product
      description: Admin-only route.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreateRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - $ref: "#/components/schemas/EmptyFieldsError"

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to fetch product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Products]
      summary: Update a product
      description: Admin-only route.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdateRequest"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invalid id or not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Products]
      summary: Delete product by id
      description: Admin-only route.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Invalid id or not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      tags: [Categories]
      summary: Get all categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      tags: [Categories]
      summary: Create a category
      description: Admin-only route.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryCreateRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - $ref: "#/components/schemas/EmptyFieldsError"

  /categories/{id}:
    get:
      tags: [Categories]
      summary: Get category by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Categories]
      summary: Update category
      description: Admin-only route.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryCreateRequest"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Categories]
      summary: Delete category by id and cascade-delete products in that category
      description: Admin-only route.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Missing category id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders:
    get:
      tags: [Orders]
      summary: Get all orders
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: ownerId
          schema:
            type: string
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      tags: [Orders]
      summary: Create a new order
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid address format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Creation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get order by id
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
