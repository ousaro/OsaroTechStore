name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"
      - "frontend/Dockerfile"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "frontend/Dockerfile"
      - ".github/workflows/frontend-ci.yml"

jobs:
  verify:
    name: Verify Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Test
        working-directory: frontend
        run: npm run test:ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Run a11y audit
        working-directory: frontend
        run: |
          npx serve -s build -l 3000 &
          SERVE_PID=$!
          sleep 3
          npx pa11y-ci --url "http://localhost:3000" --url "http://localhost:3000/products" --url "http://localhost:3000/cart" --url "http://localhost:3000/login" || true
          kill $SERVE_PID 2>/dev/null || true
