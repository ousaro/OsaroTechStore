name: Post-Deploy Smoke Test

on:
  workflow_run:
    workflows: ["Build & Push to Docker Hub"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy via ArgoCD
    runs-on: self-hosted
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Update GitOps repo and sync ArgoCD
        run: |
          GITOPS_DIR="$HOME/Projects/osarotechstore-infra"
          IMAGE_TAG="${{ github.event.workflow_run.head_sha || github.sha }}"

          # Update image tag in the local GitOps repo
          cd "$GITOPS_DIR"
          sed -i "s/newTag: .*/newTag: backend-${IMAGE_TAG}/" overlays/local/kustomization.yaml
          git add overlays/local/kustomization.yaml
          git commit -m "chore: update backend image tag to backend-${IMAGE_TAG}" || true
          git push origin main

          # Sync ArgoCD
          argocd login localhost:8080 \
            --username admin \
            --password "$(kubectl get secret -n argocd argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d)" \
            --insecure
          argocd app sync osarotechstore --timeout 120
          argocd app wait osarotechstore --health --timeout 120

  smoke-test:
    name: Run E2E Smoke Tests Post-Deploy
    needs: deploy
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run E2E smoke tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-cucumber-report
          path: backend/tests/coverage/cucumber-report.html
          if-no-files-found: ignore
